name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5==5.15.9 cryptography==41.0.7 pyinstaller==6.1.0
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name PasswordManagerSecure main.py
    
    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        files: dist/PasswordManagerSecure.exe
        tag_name: v1.0
        name: v1.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
