name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-build.txt
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name="PasswordManagerSecure" --distpath "./dist" --buildpath "./build" main.py
    
    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        files: dist/PasswordManagerSecure.exe
        tag_name: v1.0
        name: Password Manager Secure v1.0
        body: |
          🔐 Password Manager Secure v1.0
          
          ✅ Python НЕ требуется!
          
          Скачайте и запустите!
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
